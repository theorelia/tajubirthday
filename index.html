<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday Taju❤️</title>
    <link rel="stylesheet" href="style.css">
    <style>
#playMusicBtn {
    position: relative;
    z-index: 9999;
    cursor: pointer;
    pointer-events: auto !important;
}
</style>
</head>
<body>

<div class="grain"></div>

<header class="nav">
    <a href="index.html">Home</a>
    <a href="letter.html">Letter</a>
    <a href="scrapbook.html">Scrapbook</a>
    <a href="timeline.html">Timeline</a>
</header>

<section class="hero">
    <h1 class="title">To my Favourite Story,<br>My Fairytale, My HOME!</h1>
    <p class="subtitle">Happy Birthday, Jaan ❤️</p>

    <button class="music-btn" onclick="playMusic()">Play Music 🎵</button>
  
    <audio id="bgMusic" src="assets/song.mp3"></audio>
</section>
  <script>
      function playMusic() {
        const audio = document.getElementById("bgMusic");
        const btn = document.querySelector(".music-btn");

        if (audio.paused) {
          audio.play().then(() => {
            btn.innerHTML = "Pause Music ⏸️";
          }).catch(error => {
            console.log("Playback failed. Make sure assets/song.mp3 exists!", error);
          });
        } else {
          audio.pause();
          btn.innerHTML = "Play Music 🎵";
        }
      }
    </script>
</body>
</html>
