<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday Taju❤️</title>
    <link rel="stylesheet" href="style.css">
    <style>
#playMusicBtn {
    position: relative;
    z-index: 9999;
    cursor: pointer;
    pointer-events: auto !important;
}
</style>
</head>
<body>

<div class="grain"></div>

<header class="nav">
    <a href="index.html">Home</a>
    <a href="letter.html">Letter</a>
    <a href="scrapbook.html">Scrapbook</a>
    <a href="timeline.html">Timeline</a>
</header>

<section class="hero">
    <h1 class="title">To my Favourite Story,<br>My Fairytale, My HOME!</h1>
    <p class="subtitle">Happy Birthday, Jaan ❤️</p>

    <button class="music-btn" onclick="playMusic()">Play Music 🎵</button>
  
    <audio id="bgMusic" src="assets/song.mp3" loop></audio>
</section>
 <script>
  const audio = document.getElementById("bgMusic");
  const btn = document.querySelector(".music-btn");

  // 1. Sync music state on page load
  window.addEventListener("load", () => {
    const isPlaying = localStorage.getItem("musicPlaying") === "true";
    const savedTime = localStorage.getItem("musicTime");

    if (isPlaying) {
      audio.currentTime = savedTime ? parseFloat(savedTime) : 0;
      audio.play().then(() => {
        btn.innerHTML = "Pause Music ⏸️";
      }).catch(err => console.log("Autoplay blocked: Click Play to resume."));
    }
  });

  // 2. Save progress every second
  setInterval(() => {
    if (!audio.paused) {
      localStorage.setItem("musicTime", audio.currentTime);
    }
  }, 1000);

  // 3. Play/Pause Function
  function playMusic() {
    if (audio.paused) {
      audio.play();
      btn.innerHTML = "Pause Music ⏸️";
      localStorage.setItem("musicPlaying", "true");
    } else {
      audio.pause();
      btn.innerHTML = "Play Music 🎵";
      localStorage.setItem("musicPlaying", "false");
    }
  }
</script>      
</body>
</html>
